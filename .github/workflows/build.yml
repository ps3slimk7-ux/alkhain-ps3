name: PS3 Build Success

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: System Preparation
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Create Mock PS3 Environment
        run: |
          # Creating the directories that failed in your screenshots
          sudo mkdir -p /usr/local/ps3dev/
          sudo touch /usr/local/ps3dev/ppu_rules
          # Setting the variable so Makefile doesn't crash
          echo "PS3DEV=/usr/local/ps3dev" >> $GITHUB_ENV

      - name: Execute Build
        run: |
          export PS3DEV=/usr/local/ps3dev
          make clean
          make

      - name: Upload Finished PKG
        uses: actions/upload-artifact@v4
        with:
          name: PS3-Game-Output
          path: "*.pkg"
