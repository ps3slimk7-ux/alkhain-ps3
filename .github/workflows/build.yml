name: Build PS3

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential git wget python3 \
            libelf-dev libtool libtool-bin \
            autoconf automake pkg-config \
            bison flex texinfo

      - name: Set PS3DEV environment
        run: |
          echo "PS3DEV=$HOME/ps3dev" >> $GITHUB_ENV
          echo "PATH=$HOME/ps3dev/bin:$HOME/ps3dev/ppu/bin:$PATH" >> $GITHUB_ENV

      - name: Clone ps3toolchain
        run: |
          git clone https://github.com/ps3dev/ps3toolchain.git

      - name: Build toolchain
        run: |
          cd ps3toolchain
          chmod +x toolchain.sh
          ./toolchain.sh

      - name: Build project
        run: |
          make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ps3-build
          path: .
