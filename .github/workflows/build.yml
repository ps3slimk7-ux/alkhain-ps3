name: PS3 Final Build Fixed

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential wget python3 libelf-dev \
          pkg-config zlib1g-dev libncurses5-dev autoconf automake \
          bison flex libtool patch texinfo

      - name: Download Toolchain Rules
        run: |
          sudo mkdir -p /usr/local/ps3dev
          sudo chown -R $USER /usr/local/ps3dev
          # Downloading rules directly to avoid Git login errors
          wget https://github.com/ps3dev/ps3dev/archive/refs/heads/master.tar.gz
          tar -xzf master.tar.gz
          cp -r ps3dev-master/* /usr/local/ps3dev/
          
          echo "PS3DEV=/usr/local/ps3dev" >> $GITHUB_ENV
          echo "PATH=/usr/local/ps3dev/bin:/usr/local/ps3dev/ppu/bin:$PATH" >> $GITHUB_ENV

      - name: Build Game PKG
        run: |
          export PS3DEV=/usr/local/ps3dev
          export PATH=$PS3DEV/bin:$PS3DEV/ppu/bin:$PATH
          make clean
          make

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PS3-Game-Package
          path: "*.pkg"
