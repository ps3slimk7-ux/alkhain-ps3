name: Build PS3

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential git wget python3 \
            libelf-dev pkg-config zlib1g-dev libncurses5-dev unzip

      - name: Install PS3 Toolchain
        run: |
          # Downloading a stable toolchain release directly
          wget https://github.com/ps3dev/ps3toolchain/releases/download/v20230626/ps3dev-ubuntu-latest-20230626.tar.gz
          # Extracting to the root directory
          sudo tar -xzf ps3dev-ubuntu-latest-20230626.tar.gz -C /
          # Cleanup
          rm ps3dev-ubuntu-latest-20230626.tar.gz

      - name: Set environment variables
        run: |
          echo "PS3DEV=/usr/local/ps3dev" >> $GITHUB_ENV
          echo "PS3SDK=/usr/local/ps3dev/portlibs/ppu" >> $GITHUB_ENV
          echo "PATH=/usr/local/ps3dev/bin:/usr/local/ps3dev/ppu/bin:/usr/local/ps3dev/spu/bin:$PATH" >> $GITHUB_ENV

      - name: Build project
        run: |
          if [ -f Makefile ]; then
            make
          else
            echo "Error: Makefile not found!"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ps3-build
          path: .
 
