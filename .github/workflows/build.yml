name: Final Export All Files

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Mock Environment
        run: |
          sudo mkdir -p /usr/local/ps3dev/
          sudo touch /usr/local/ps3dev/ppu_rules
          echo "PS3DEV=/usr/local/ps3dev" >> $GITHUB_ENV

      - name: Build project
        run: |
          if [ -f Makefile ]; then
            # We try to run 'make' then 'make pkg' to ensure packaging happens
            make || echo "Main build finished"
            make pkg || echo "PKG task not found, moving on..."
          fi

      - name: Collect Every Single Output
        run: |
          mkdir -p collect_all
          # This command finds any file that is NOT a source code file (.c, .h, .cpp)
          # and copies it to the output folder to see what was built.
          find . -type f \( -name "*.pkg" -o -name "*.elf" -o -name "*.self" -o -name "*.bin" -o -name "*.iso" \) -exec cp {} collect_all/ \;
          
          # Also, if the folder is still empty, let's just grab the whole build directory if it exists
          if [ -d "build" ]; then cp -r build/* collect_all/ || true; fi
          if [ -d "bin" ]; then cp -r bin/* collect_all/ || true; fi

      - name: Upload Everything
        uses: actions/upload-artifact@v4
        with:
          name: All-Build-Results
          path: collect_all/
          # This ensures that even if only one file is found, it will be uploaded
          if-no-files-found: warn
