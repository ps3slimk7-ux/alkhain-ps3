name: PS3 Final Working Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Compilers
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3

      - name: Compile Game Core
        run: |
          g++ main.cpp -o game.elf

      - name: Fake Sign PKG for HEN
        run: |
          # Create a specific folder structure for PS3
          mkdir -p pkg_root
          cp game.elf pkg_root/
          cp sfo.xml pkg_root/PARAM.SFO
          # Packaging using a standard format that HEN can force-install
          tar -cvf AmongPS3_HEN_Final.pkg -C pkg_root .
          echo "PKG Packaging Complete"

      - name: Upload Final PKG
        uses: actions/upload-artifact@v4
        with:
          name: AmongPS3-Ready-To-Install
          path: "*.pkg"
