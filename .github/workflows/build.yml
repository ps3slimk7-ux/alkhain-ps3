name: Build PS3

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # This is the official, stable container provided by the ps3dev team
    container: ghcr.io/ps3dev/ps3dev:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build project
        run: |
          # The environment is already pre-configured in this container
          # We just need to trigger the make command
          if [ -f Makefile ]; then
            make
          else
            echo "Error: Makefile not found in the repository root!"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ps3-build-output
          # This captures everything created during the build
          path: .
