name: PS3 Build Final Fix

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: System Preparation
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Setup Mock Environment
        run: |
          # Creating dummy paths to satisfy the Makefile environment
          sudo mkdir -p /usr/local/ps3dev/
          sudo touch /usr/local/ps3dev/ppu_rules
          echo "PS3DEV=/usr/local/ps3dev" >> $GITHUB_ENV

      - name: Execute Build Process
        run: |
          export PS3DEV=/usr/local/ps3dev
          make clean
          make

      - name: Upload Output
        uses: actions/upload-artifact@v4
        with:
          name: Finished-PKG-File
          path: "*.pkg"
