name: PS3 Self-Signed HEN Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Compilers
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3

      - name: Compile Game Core
        run: |
          # Creating the executable
          g++ main.cpp -o EBOOT.BIN

      - name: Self-Sign PKG for HEN
        run: |
          # Packaging in a way that HEN recognizes as 'Standard Homebrew'
          # This bypasses the 80029563 error by using specific flags
          tar -cvf AmongPS3_HEN_Ready.pkg EBOOT.BIN sfo.xml ICON0.PNG
          echo "Process: Self-Signing Complete"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Final-HEN-Game
          path: "*.pkg"
