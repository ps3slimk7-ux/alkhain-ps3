name: Find and Export PS3 PKG

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Mock PS3 Environment
        run: |
          sudo mkdir -p /usr/local/ps3dev/
          sudo touch /usr/local/ps3dev/ppu_rules
          echo "PS3DEV=/usr/local/ps3dev" >> $GITHUB_ENV

      - name: Build project
        run: |
          if [ -f Makefile ]; then
            # Running make and forcing it to show all files created
            make || echo "Continuing to search for outputs..."
          fi

      - name: Deep Search for PKG and ELF
        run: |
          mkdir -p final_output
          echo "Listing all files created during build:"
          find . -maxdepth 4 -not -path '*/.*'
          
          # Copying any possible game files found
          find . -name "*.pkg" -exec cp {} final_output/ \;
          find . -name "*.elf" -exec cp {} final_output/ \;
          find . -name "*.self" -exec cp {} final_output/ \;
          find . -name "*.bin" -exec cp {} final_output/ \;

      - name: Upload Everything Found
        uses: actions/upload-artifact@v4
        with:
          name: PS3-Build-Files
          # If no PKG is found, this will at least upload the ELF/BIN files
          path: final_output/
