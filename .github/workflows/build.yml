name: Build PS3 Toolchain

on:
push:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

steps:
- name: Checkout repository
  uses: actions/checkout@v3

- name: Install dependencies
  run: |
    sudo apt update
    sudo apt install -y build-essential git wget \
    libtool autoconf automake bison flex texinfo \
    libgmp-dev libmpfr-dev libmpc-dev libelf-dev

- name: Set environment variables
  run: |
    echo "PS3DEV=$HOME/ps3dev" >> $GITHUB_ENV
    echo "PATH=$HOME/ps3dev/bin:$HOME/ps3dev/ppu/bin:$HOME/ps3dev/spu/bin:$PATH" >> $GITHUB_ENV

- name: Clone ps3toolchain
  run: |
    git clone https://github.com/ps3dev/ps3toolchain.git

- name: Build toolchain
  run: |
    cd ps3toolchain
    ./toolchain.sh

- name: Upload toolchain
  uses: actions/upload-artifact@v3
  with:
    name: ps3-toolchain
    path: $HOME/ps3dev
