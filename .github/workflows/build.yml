name: Build PS3 PKG - Al-Khain

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ps3dev/ps3dev:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PS3 environment
        run: |
          export PS3DEV=/usr/local/ps3dev
          export PSL1GHT=/usr/local/ps3dev/psl1ght
          export PATH=$PS3DEV/bin:$PS3DEV/ppu/bin:$PATH

      # 🔥 إنشاء مشروع كامل تلقائياً
      - name: Create simple PS3 project
        run: |
          mkdir -p source

          # كود بسيط
          cat > source/main.c << 'EOF'
#include <stdio.h>

int main() {
    printf("Hello from PS3!\n");
    return 0;
}
EOF

          # Makefile جاهز
          cat > Makefile << 'EOF'
TARGET = hello_ps3
OBJS = source/main.o

include $(PSL1GHT)/ppu_rules

pkg: $(TARGET).self
	$(PS3DEV)/bin/pack-pkg pkgfiles/ $(TARGET).pkg

$(TARGET).self: $(OBJS)
EOF

          mkdir -p pkgfiles

      # 🧱 البناء
      - name: Build PKG
        run: |
          make clean || true
          make pkg

      # 📦 رفع الملف
      - name: Upload PKG
        uses: actions/upload-artifact@v4
        with:
          name: PS3-PKG
          path: "*.pkg"
