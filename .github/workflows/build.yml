name: Build PS3

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential \
          git \
          python3 \
          wget \
          libelf-dev \
          libtool \
          libtool-bin \
          autoconf \
          automake \
          pkg-config \
          bison \
          flex \
          texinfo

    - name: Set PS3DEV
      run: |
        echo "PS3DEV=/usr/local/ps3dev" >> $GITHUB_ENV

    - name: Clone PS3 Toolchain
      run: |
        git clone https://github.com/ps3dev/ps3toolchain.git

    - name: Build Toolchain
      run: |
        cd ps3toolchain
        sudo ./toolchain.sh

    - name: Build App
      run: |
        export PATH=$PATH:$PS3DEV/bin
        ppu-g++ main.cpp -o app.elf

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ps3-app
        path: app.elf
