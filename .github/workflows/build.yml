name: Build PS3

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential git wget python3 \
            libelf-dev pkg-config zlib1g-dev libncurses5-dev

      - name: Install Toolchain Binaries
        run: |
          # Downloading from a stable, direct mirror to avoid 404/Auth issues
          wget https://github.com/ps3dev/ps3toolchain/releases/download/v20220215/ps3dev-ubuntu-latest-20220215.tar.gz
          sudo tar -xzf ps3dev-ubuntu-latest-20220215.tar.gz -C /
          rm ps3dev-ubuntu-latest-20220215.tar.gz

      - name: Set Environment
        run: |
          # Defining paths so the Makefile can find ppu_rules
          echo "PS3DEV=/usr/local/ps3dev" >> $GITHUB_ENV
          echo "PS3SDK=/usr/local/ps3dev/portlibs/ppu" >> $GITHUB_ENV
          echo "PATH=/usr/local/ps3dev/bin:/usr/local/ps3dev/ppu/bin:/usr/local/ps3dev/spu/bin:$PATH" >> $GITHUB_ENV

      - name: Build project
        run: |
          if [ -f Makefile ]; then
            make
          else
            echo "Error: Makefile not found!"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ps3-build
          path: .
 
