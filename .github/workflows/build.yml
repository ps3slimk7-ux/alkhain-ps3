name: Build PS3

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential git wget python3 \
            libelf-dev pkg-config

      - name: Download PS3 toolchain
        run: |
          # Using git with an empty credential helper to avoid the username prompt
          git -c "credential.helper=" clone --depth 1 https://github.com/ps3dev/ps3dev.git $HOME/ps3dev

      - name: Set environment
        run: |
          echo "PS3DEV=$HOME/ps3dev" >> $GITHUB_ENV
          echo "PATH=$HOME/ps3dev/bin:$PATH" >> $GITHUB_ENV

      - name: Build project
        run: |
          if [ -f Makefile ]; then
            make
          else
            echo "Error: Makefile not found!"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ps3-build
          path: .
