name: Build PS3

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/ps3dev/ps3dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          make

      - name: Create PKG
        run: |
          make pkg

      - name: Upload PKG
        uses: actions/upload-artifact@v4
        with:
          name: ps3-build
          path: |
            *.pkg
            *.elf
