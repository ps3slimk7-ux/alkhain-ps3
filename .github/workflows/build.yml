name: PS3 Build Ultimate

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/ps3dev/ps3dev:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and Package
        run: |
          export PS3DEV=/usr/local/ps3dev
          export PSL1GHT=$PS3DEV/ppu
          export PATH=$PATH:$PS3DEV/bin:$PS3DEV/ppu/bin:$PS3DEV/spu/bin
          
          make clean || true
          make
          
          # Force packaging if the Makefile has a pkg rule
          if [ ! -f *.pkg ]; then
            make pkg || echo "No pkg rule found, searching for elf files..."
          fi

      - name: Archive Results
        uses: actions/upload-artifact@v4
        with:
          name: PS3-Project-Output
          path: |
            **/*.pkg
            **/*.elf
            **/*.self
            **/*.bin
          if-no-files-found: error
