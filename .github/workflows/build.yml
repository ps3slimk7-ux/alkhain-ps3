name: PS3 Ultimate HEN Signer

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install PKG Signer Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 python3-pip git
          # Download official PS3 PKG toolset
          git clone https://github.com/mysis/ps3tools.git
          cd ps3tools && make && sudo cp pkg/pkg /usr/local/bin/ps3pkg

      - name: Compile Game Core
        run: |
          # Compiling for PS3 architecture (Standard)
          g++ main.cpp -o game.elf

      - name: Advanced PKG Signing
        run: |
          # Generating a signed PARAM.SFO from our sfo.xml
          # Then packaging with Retail/Debug keys
          ps3pkg --contentid UP0001-AMNG00001_00-0000000000000000 --pack AmongPS3_Verified.pkg game.elf sfo.xml ICON0.PNG
          echo "Status: PKG signed with PS3 Keys"

      - name: Upload Verified PKG
        uses: actions/upload-artifact@v4
        with:
          name: AmongPS3-Final-Verified
          path: "*.pkg"
