name: Build PS3

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Using a highly reliable community container for PS3 development
    container: bucanero/ps3dev:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build project
        run: |
          # The bucanero container has all tools and paths pre-configured
          if [ -f Makefile ]; then
            make
          else
            echo "Error: Makefile not found!"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ps3-build
          path: .
 
