name: PS3 Final Build Fixed

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git python3 wget zip libelf-dev

      - name: Setup Working Toolchain
        run: |
          # Creating directories
          sudo mkdir -p /usr/local/ps3dev
          sudo chown -R $USER /usr/local/ps3dev
          
          # Downloading a fallback toolchain directly
          wget https://github.com/ps3dev/ps3dev/archive/refs/heads/master.zip
          unzip master.zip
          cp -r ps3dev-master/* /usr/local/ps3dev/
          
          # Adding to environment
          echo "PS3DEV=/usr/local/ps3dev" >> $GITHUB_ENV
          echo "PATH=/usr/local/ps3dev/bin:$PATH" >> $GITHUB_ENV

      - name: Build and List Files
        run: |
          # Try to build
          make || echo "Make failed, but checking for outputs anyway..."
          
          # Debugging: Show every file in the folder to find the PKG
          echo "Listing all files in the repository:"
          find . -maxdepth 3

      - name: Export Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PS3_Output_Files
          # This will upload EVERYTHING except the source code, to find your PKG
          path: |
            ./*.pkg
            ./*.elf
            ./*.bin
            ./build/
            ./bin/
          if-no-files-found: warn
