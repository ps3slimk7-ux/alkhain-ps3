name: Build PS3

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt update && sudo apt install -y build-essential

      - name: Build
        run: g++ main.cpp -o app

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: app 
