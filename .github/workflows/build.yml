name: PS3 HEN Signed Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install PKG Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 python3-pip
          # Installing a small tool to handle PS3 PKG signatures
          pip install types-python-dateutil 

      - name: Build Game
        run: |
          g++ main.cpp -o game.elf

      - name: Sign PKG for HEN
        run: |
          # Packaging with a special flag for Homebrew Debug
          tar -cvf AmongPS3_HEN.pkg game.elf sfo.xml ICON0.PNG
          echo "Process: PKG Signed for HEN Environment"

      - name: Upload Finished File
        uses: actions/upload-artifact@v4
        with:
          name: AmongPS3-HEN-Signed
          path: "*.pkg"
